<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Centro Mundialista 2026</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <h2>🌎 Centro Mundialista 2026</h2>
            <p class="subtitle">Inicia sesión para ingresar a la plataforma oficial del campeonato...</p>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" required placeholder=" ">
                    <label for="username">Usuario :</label>
                </div>

                <div class="input-group">

                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Contraseña :</label>
                </div>

                <div class="error-message" id="errorMessage">
                    Credenciales incorrectas, intente de nuevo.
                </div>

                <button type="submit" class="btn-login">
                    <span>Ingresar</span>

                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
